version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: feedback-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - feedback-network

  # 2. Node.js Backend API
  backend:
    build: ./backend
    container_name: feedback-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - feedback-network

  # 3. Nginx Frontend
  frontend:
    build: ./frontend
    container_name: feedback-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - feedback-network

# Define persistent storage for MongoDB
volumes:
  mongodb_data:

# Define a custom bridge network for the containers to communicate
networks:
  feedback-network:
    driver: bridge
