<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Online Feedback System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">OFS Admin</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="feedback.html">Give Feedback</a>
            <a href="admin.html" class="active">Admin</a>
        </div>
    </nav>

    <main style="align-items: flex-start; padding-top: 2rem;">
        <!-- Login Form Container -->
        <div id="loginContainer" class="glass-container form-container" style="display: none; max-width: 400px; margin: 4rem auto;">
            <div class="form-header">
                <h2>Admin Login</h2>
                <p>Please enter your credentials</p>
            </div>
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="admin123">
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%;">Login</button>
                <div id="loginMessage" style="display: none; margin-top: 1rem; text-align: center;"></div>
            </form>
        </div>

        <!-- Admin Dashboard Container -->
        <div id="dashboardContainer" class="glass-container admin-container" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem;">Feedback Dashboard</h2>
                <div>
                    <button onclick="fetchFeedback()" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem; margin-right: 0.5rem;">Refresh</button>
                    <button onclick="logoutAdmin()" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.875rem; background-color: var(--error);">Logout</button>
                </div>
            </div>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Category</th>
                            <th style="width: 40%;">Message</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="5">
                                <div class="loading-spinner">
                                    <div class="spinner"></div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <div id="paginationControls" style="display: flex; justify-content: center; align-items: center; margin-top: 1.5rem;"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
